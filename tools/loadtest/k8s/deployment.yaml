apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-load-tester
  namespace: default
  labels:
    app: claude-load-tester
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-load-tester
  template:
    metadata:
      labels:
        app: claude-load-tester
    spec:
      containers:
      - name: loadtest
        image: claude-load-tester:latest
        ports:
        - containerPort: 8080
          name: api
        command:
        - /app/claude-load-tester
        args:
        - run
        - --api-enabled
        - --api-addr
        - :8080
        - --api-prometheus
        - --mode
        - fixed
        - --workers
        - "30"
        - --duration
        - 1h
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/status
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/status
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: results
          mountPath: /app/results
      volumes:
      - name: results
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: claude-load-tester
  namespace: default
  labels:
    app: claude-load-tester
spec:
  selector:
    app: claude-load-tester
  ports:
  - port: 8080
    targetPort: 8080
    name: api
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: claude-load-tester-external
  namespace: default
  labels:
    app: claude-load-tester
spec:
  selector:
    app: claude-load-tester
  ports:
  - port: 8080
    targetPort: 8080
    name: api
  type: NodePort
