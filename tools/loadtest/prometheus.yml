global:
  scrape_interval: 5s
  evaluation_interval: 5s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Load Tester
  - job_name: 'claude-load-tester'
    static_configs:
      - targets: ['localhost:8080']
    metrics_path: /api/metrics
    scrape_interval: 5s
    scrape_timeout: 3s

  # Prometheus Self
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
